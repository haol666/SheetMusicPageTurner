name: iOS Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    - name: Build
      run: |
        xcodebuild -project SheetMusicPageTurner.xcodeproj \
          -scheme SheetMusicPageTurner \
          -destination "generic/platform=iOS Simulator,name=iPhone 15" \
          build