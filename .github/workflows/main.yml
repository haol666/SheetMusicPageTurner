name: iOS Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Build
      run: |
        xcodebuild -project SheetMusicPageTurner.xcodeproj \
          -scheme SheetMusicPageTurner \
          -destination "generic/platform=iOS Simulator" \
          -derivedDataPath build \
          build