name: iOS Build and Release

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Build IPA
      run: |
        xcodebuild -project SheetMusicPageTurner.xcodeproj \
          -scheme SheetMusicPageTurner \
          -configuration Release \
          -archivePath build/SheetMusicPageTurner.xcarchive \
          archive

    - name: Export IPA
      run: |
        cat > /tmp/ExportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
        </dict>
        </plist>
        EOF
        
        xcodebuild -exportArchive \
          -archivePath build/SheetMusicPageTurner.xcarchive \
          -exportPath output \
          -exportOptionsPlist /tmp/ExportOptions.plist

    - name: Package app
      run: |
        mkdir -p output
        mv output/SheetMusicPageTurner.ipa output/ || cp -r build/Build/Products/Debug-iphonesimulator/SheetMusicPageTurner.app output/SheetMusicPageTurner.app
        cd output && zip -r SheetMusicPageTurner.app.zip SheetMusicPageTurner.app 2>/dev/null || zip -r SheetMusicPageTurner.ipa.zip SheetMusicPageTurner.ipa

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SheetMusicPageTurner
        path: output/

    - name: Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: output/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}